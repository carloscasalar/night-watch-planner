name: Publish Docker Images

on:
  push:
    tags:
      - '*'
    branches:
      - '**/registry-publish/**'  # Matches branches with registry-publish in the path

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github. repository_owner }}/night-watch-planner

jobs:
  build-and-push-optimizer:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env. REGISTRY }}
          username: ${{ github. actor }}
          password: ${{ secrets. GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env. REGISTRY }}/${{ env.IMAGE_PREFIX }}-optimizer
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push optimizer image
        uses: docker/build-push-action@v5
        with:
          context: ./optimizer
          push: true
          tags: ${{ steps. meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NWP_CLIENT_URL=https://your-client-url.com

  build-and-push-client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env. REGISTRY }}
          username: ${{ github. actor }}
          password: ${{ secrets. GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env. IMAGE_PREFIX }}-client
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta. outputs.labels }}

