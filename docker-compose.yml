services:
  optimizer:
    build:
      context: ./optimizer
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NWP_CLIENT_URL=http://localhost:8080
    healthcheck:
      test: ["CMD-SHELL", "netstat -an | grep 3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  client:
    build:
      context: ./client
    ports:
      - "8080:80"
    environment:
      - PLAN_REST_API_HOST=http://localhost:3000
    depends_on:
      - optimizer
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
